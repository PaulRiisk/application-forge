# build the vite app and publish dist/ to github pages on every push to main
# pages base path is already set to /application-forge/ in vite.config.ts

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # allow manual runs from the Actions tab
  workflow_dispatch:

# permissions the deploy-pages action needs
permissions:
  contents: read
  pages: write
  id-token: write

# one deploy at a time; let an in-progress run finish (don't cancel a live deploy)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      # note: no `enablement: true` — creating a pages site needs a user token
      # (PAT with repo scope); the workflow's GITHUB_TOKEN is always rejected
      # with 403 for that call. pages must be switched on once in
      # settings → pages → source: "GitHub Actions"
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
